<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>沽源县双益农业发展有限公司</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <!-- 高德地图 JS API 异步加载，不阻塞页面 -->
    <script src="https://webapi.amap.com/maps?v=2.0&key=94cd9de26c92f9e765aad93e2ad114a9" defer></script>
  </head>
  <body>
    <div id="app">
      <!-- Vue 挂载前显示的骨架屏 -->
      <style>
        body { margin: 0; font-family: system-ui,-apple-system,sans-serif; }
        .loading-wrap { min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; background:#f8fafc; }
        .loading-logo { width:64px; height:64px; background:#15803d; border-radius:16px; display:flex; align-items:center; justify-content:center; color:#fff; font-size:28px; margin-bottom:20px; animation:pulse 1.5s ease-in-out infinite; }
        .loading-text { color:#475569; font-size:16px; }
        @keyframes pulse { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.05);opacity:.8} }
      </style>
      <div class="loading-wrap">
        <div class="loading-logo">🌱</div>
        <div class="loading-text">正在加载...</div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
